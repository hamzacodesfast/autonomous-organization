services:
  postgres:
    image: postgres:17-alpine
    container_name: autonomous-organization-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: autonomous_organization
      POSTGRES_USER: ao_user
      POSTGRES_PASSWORD: ao_password
    ports:
      - "5432:5432"
    volumes:
      - ao_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ao_user -d autonomous_organization"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  ao_postgres_data:
